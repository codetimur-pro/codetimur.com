* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--black); color: var(--text); }

}
.eyebrow::before {

}

h1, h2, h3, h4 {

.btn {

  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: color .4s ease, border-color .4s ease;
}
.btn::before {
  content: "";
  position: absolute; inset: 0;

  transform: translateY(101%);

.btn .arrow {
  width: 14px; height: 1px; background: currentColor; position: relative;
  transition: width .4s ease;
}
.btn .arrow::after {
  content: ""; position: absolute; right: -1px; top: -3px;
  width: 7px; height: 7px;
  border-right: 1px solid currentColor;
  border-top: 1px solid currentColor;
  transform: rotate(45deg);
}
.btn:hover .arrow { width: 22px; }

.btn--solid {

<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 12);
  }, { passive: true });

  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });
  window.__attachReveal = (root) => {
    (root || document).querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
  };

  document.addEventListener('click', (e) => {
    const a = e.target.closest('a[href^="#"]');
    if (!a) return;
    const id = a.getAttribute('href').slice(1);
    const el = document.getElementById(id);
    if (el) {
      e.preventDefault();
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
</script>

const VECTORS = [
  { n: "I",   title: "Видение", tag: "Топливо для миссии",   text: "Когда ты видишь своё истинное будущее — открывается мощный поток энергии. Это топливо для твоей миссии в мире." },

  { n: "III", title: "Поток",   tag: "Баланс воли и потока",  text: "Три состояния: дисциплина, поток и адаптивность. Навык — в моменте выбирать, что включить. Поток эффективнее воли, но требует баланса." },
];

const Slider = ({ vec, value, onChange, onComplete, completed }) => {
  const trackRef = React.useRef(null);
  const isDragging = React.useRef(false);

  const updateFromPointer = (clientX) => {
    const track = trackRef.current;
    if (!track) return;
    const rect = track.getBoundingClientRect();
    let pct = (clientX - rect.left) / rect.width;
    pct = Math.max(0, Math.min(1, pct));
    const v = Math.round(pct * 100);
    onChange(v);
    if (v >= 100) onComplete();
  };

  const onDown = (e) => {
    isDragging.current = true;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    updateFromPointer(x);
    const move = (ev) => {
      if (!isDragging.current) return;
      updateFromPointer(ev.touches ? ev.touches[0].clientX : ev.clientX);
    };
    const up = () => {
      isDragging.current = false;
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
      window.removeEventListener('touchmove', move);
      window.removeEventListener('touchend', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move, { passive: false });
    window.addEventListener('touchend', up);
  };

  return (
    <div className={`hslider ${completed ? 'is-complete' : ''}`}>
      <div className="hslider__head">
        <span className="hslider__n numeral">{vec.n}</span>
        <span className="hslider__title">{vec.title}</span>
        <span className="hslider__value">{value}<span className="hslider__pct">%</span></span>
      </div>
      <div className="hslider__track" ref={trackRef} onMouseDown={onDown} onTouchStart={onDown}>
        <div className="hslider__ticks">
          {Array.from({ length: 21 }).map((_, i) => (
            <div key={i} className={`hslider__tick ${i % 5 === 0 ? 'is-major' : ''}`}></div>
          ))}
        </div>
        <div className="hslider__fill" style={{ width: `${value}%` }}>
          <div className="hslider__fill-glow"></div>
        </div>
        <div className="hslider__thumb" style={{ left: `${value}%` }}>
          <div className="hslider__thumb-inner"></div>
        </div>
      </div>
    </div>
  );
};

const Vectors = () => {
  const [values, setValues] = React.useState([0, 0, 0]);
  const [completed, setCompleted] = React.useState([false, false, false]);

  const setVal = (i, v) => setValues(prev => { const n = [...prev]; n[i] = v; return n; });
  const complete = (i) => setCompleted(prev => { if (prev[i]) return prev; const n = [...prev]; n[i] = true; return n; });
  const allDone = completed.every(Boolean);

  return (
    <section className="vec" id="vectors">

<!-- SHADOW -->
<script type="text/babel">
const Shadow = () => {
  const sectionRef = React.useRef(null);
  const [progress, setProgress] = React.useState(0);

  React.useEffect(() => {
    const onScroll = () => {
      const sec = sectionRef.current;
      if (!sec) return;
      const rect = sec.getBoundingClientRect();
      const vh = window.innerHeight;
      const total = rect.height - vh;
      if (total <= 0) return;
      const passed = -rect.top;
      setProgress(Math.max(0, Math.min(1, passed / total)));
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onScroll);
    };
  }, []);

  const lerp = (a, b, t) => a + (b - a) * Math.max(0, Math.min(1, t));
  const wash  = lerp(0, 1, (progress - 0.20) / 0.35);
  const bloom = lerp(0, 1, (progress - 0.55) / 0.23);
  const text1 = 1 - lerp(0, 1, (progress - 0.20) / 0.10);
  const text2In  = lerp(0, 1, (progress - 0.25) / 0.10);
  const text2Out = lerp(0, 1, (progress - 0.65) / 0.10);
  const text2 = Math.max(0, text2In - text2Out);
  const text3 = lerp(0, 1, (progress - 0.75) / 0.12);

  return (
    <section className="shadow" id="shadow" ref={sectionRef}>
      <div className="shadow__pin">
        <div className="container shadow__stage">
          <div className="shadow__text shadow__text--1" style={{ opacity: text1, transform: `translateY(${(1 - text1) * -12}px)` }}>
            <h2 className="shadow__title">Твоё <em>главное<br/>испытание</em>.</h2>
          </div>
          <div className="shadow__text shadow__text--2" style={{ opacity: text2, transform: `translateY(${(1 - text2) * 12}px)` }}>
            <h2 className="shadow__title">Это встреча со&nbsp;своей<br/><em>тёмной стороной</em>.</h2>
          </div>
          <div className="shadow__text shadow__text--3" style={{ opacity: text3, transform: `translateY(${(1 - text3) * 14}px)` }}>
            <p className="shadow__statement">
              Встретившись со&nbsp;своей <em>тёмной стороной</em> и&nbsp;полностью приняв её&nbsp;— ты&nbsp;активируешь свои <em>скрытые сверхспособности</em>.
            </p>
          </div>
        </div>

        <div className="shadow__bg" aria-hidden="true">
          <div className="shadow__wash shadow__wash--warm" style={{ opacity: 0.25 + wash * 0.55, transform: `translateX(${-30 + wash * 30}%)` }}></div>
          <div className="shadow__wash shadow__wash--cool" style={{ opacity: 0.35 + wash * 0.55, transform: `translateX(${30 - wash * 30}%)` }}></div>
          <div className="shadow__ring" style={{ opacity: wash * (1 - bloom), transform: `translate(-50%, -50%) scale(${1.6 - wash * 0.8})` }}></div>
          <div className="shadow__disc" style={{ opacity: wash * 0.95, transform: `translate(-50%, -50%) scale(${0.6 + wash * 0.4})` }}></div>
          <div className="shadow__corona shadow__corona--inner" style={{ opacity: bloom, transform: `translate(-50%, -50%) scale(${0.6 + bloom * 1.0})` }}></div>
          <div className="shadow__corona shadow__corona--outer" style={{ opacity: bloom * 0.85, transform: `translate(-50%, -50%) scale(${0.8 + bloom * 1.6})` }}></div>
          <div className="shadow__corona shadow__corona--rim" style={{ opacity: bloom, transform: `translate(-50%, -50%) scale(${0.7 + bloom * 0.5})` }}></div>
          <div className="shadow__sparkles" style={{ opacity: bloom * 0.9 }}>
            {Array.from({ length: 14 }).map((_, i) => (
              <span key={i} className="shadow__sparkle" style={{ '--a': `${(i / 14) * 360}deg`, '--d': `${120 + (i % 3) * 40}px`, '--del': `${(i % 5) * 0.4}s` }}></span>
            ))}
          </div>
          <div className="shadow__vignette"></div>
        </div>

        <div className="shadow__hint" style={{ opacity: Math.max(0, 1 - progress * 6) }}>
          <span>Прокрути, чтобы войти</span>
          <span className="shadow__hint-line"></span>
        </div>
      </div>

      <style>{`
        .shadow { height: 260vh; position: relative; padding: 0; background: #050505; }
        .shadow__pin { position: sticky; top: 0; height: 100vh; width: 100%; overflow: hidden; display: grid; grid-template-rows: 1fr auto 1fr; align-items: stretch; }
        .shadow__bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
        .shadow__wash { position: absolute; top: -10%; bottom: -10%; width: 75%; mix-blend-mode: screen; filter: blur(60px); will-change: transform, opacity; }
        .shadow__wash--warm { left: -25%; background: radial-gradient(60% 100% at 80% 50%, rgba(212,165,116,0.55), transparent 70%); }
        .shadow__wash--cool { right: -25%; background: radial-gradient(60% 100% at 20% 50%, rgba(20,15,8,0.95), transparent 65%); mix-blend-mode: multiply; }
        .shadow__ring { position: absolute; left: 50%; top: 50%; width: 520px; height: 520px; border: 1px solid rgba(212,165,116,0.45); border-radius: 50%; box-shadow: inset 0 0 60px rgba(212,165,116,0.08), 0 0 60px rgba(212,165,116,0.12); will-change: transform, opacity; }
        .shadow__disc { position: absolute; left: 50%; top: 50%; width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle at 50% 50%, #0a0807 0%, #050403 80%); border: 1px solid rgba(232,199,154,0.25); box-shadow: inset 0 0 32px rgba(0,0,0,0.9); will-change: transform, opacity; }
        .shadow__corona { position: absolute; left: 50%; top: 50%; border-radius: 50%; pointer-events: none; mix-blend-mode: screen; will-change: transform, opacity; }
        .shadow__corona--inner { width: 360px; height: 360px; background: radial-gradient(circle, rgba(255,250,240,0.95) 0%, rgba(232,199,154,0.65) 18%, rgba(212,165,116,0.25) 42%, rgba(212,165,116,0) 70%); filter: blur(6px); }
        .shadow__corona--outer { width: 720px; height: 720px; background: radial-gradient(circle, rgba(232,199,154,0.4) 0%, rgba(212,165,116,0.18) 25%, rgba(212,165,116,0.06) 50%, transparent 75%); filter: blur(24px); }
        .shadow__corona--rim { width: 280px; height: 280px; border: 1px solid rgba(255,245,220,0.55); box-shadow: 0 0 40px rgba(255,245,220,0.4), inset 0 0 30px rgba(255,245,220,0.25); background: transparent; }
        .shadow__sparkles { position: absolute; left: 50%; top: 50%; width: 0; height: 0; }
        .shadow__sparkle { position: absolute; left: 0; top: 0; width: 3px; height: 3px; border-radius: 50%; background: var(--gold-light); box-shadow: 0 0 8px var(--gold-light); transform: rotate(var(--a)) translateX(var(--d)); transform-origin: 0 0; animation: shadowTwinkle 2.6s ease-in-out infinite; animation-delay: var(--del); }
        @keyframes shadowTwinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        .shadow__vignette { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, transparent 28%, rgba(5,5,5,0.55) 70%, rgba(5,5,5,0.85) 100%), linear-gradient(180deg, rgba(5,5,5,0.4) 0%, transparent 22%, transparent 70%, rgba(5,5,5,0.6) 100%); pointer-events: none; }
        .shadow__stage { position: relative; z-index: 2; grid-row: 1 / 4; grid-column: 1; align-self: center; display: grid; place-items: center; }
        .shadow__text { grid-row: 1; grid-column: 1; width: 100%; display: grid; justify-items: center; text-align: center; will-change: opacity, transform; pointer-events: none; }
        .shadow__title { font-family: var(--display); font-weight: 300; font-size: clamp(38px, 5.4vw, 86px); line-height: 1.04; color: var(--text); max-width: 18ch; text-shadow: 0 2px 24px rgba(5,5,5,0.95), 0 0 60px rgba(5,5,5,0.85); }
        .shadow__title em { font-style: italic; color: var(--gold-light); }
        .shadow__statement { font-family: var(--display); font-weight: 300; font-size: clamp(22px, 2.4vw, 36px); line-height: 1.4; color: var(--text); max-width: 26ch; text-shadow: 0 2px 18px rgba(5,5,5,0.95), 0 0 40px rgba(5,5,5,0.85); }
        .shadow__statement em { font-style: italic; color: var(--gold-light); font-weight: 400; }
        .shadow__hint { position: absolute; left: 50%; bottom: 28px; transform: translateX(-50%); display: inline-flex; flex-direction: column; align-items: center; gap: 12px; font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); z-index: 3; }
        .shadow__hint-line { width: 1px; height: 36px; background: linear-gradient(180deg, var(--muted), transparent); }
        @media (max-width: 720px) {
          .shadow { height: 240vh; }
          .shadow__disc { width: 160px; height: 160px; }
          .shadow__corona--inner { width: 260px; height: 260px; }
          .shadow__corona--outer { width: 480px; height: 480px; }
          .shadow__corona--rim { width: 200px; height: 200px; }
          .shadow__ring { width: 360px; height: 360px; }
        }
      `}</style>
    </section>
  );
};

const shadowRoot = ReactDOM.createRoot(document.getElementById('shadow-root'));
shadowRoot.render(<Shadow />);
</script>

      `}</style>
    </section>
  );
