<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Наставничество — Тимур · Ускоритель твоей реализации</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Manrope:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
:root {
  --black: #070707;
  --black-2: #0c0c0c;
  --black-3: #131211;
  --gold: #d4a574;
  --gold-light: #e8c79a;
  --gold-deep: #a87f4f;
  --text: #f4ece2;
  --muted: #8a8278;
  --line: rgba(212, 165, 116, 0.18);
  --line-soft: rgba(244, 236, 226, 0.08);

  --display: "Cormorant Garamond", "Times New Roman", serif;
  --body: "Manrope", system-ui, -apple-system, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--black); color: var(--text); }
body {
  font-family: var(--body);
  font-weight: 300;
  font-size: 16px;
  line-height: 1.6;
  letter-spacing: 0.01em;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

::selection { background: var(--gold); color: var(--black); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: rgba(212, 165, 116, 0.18); border-radius: 8px; }
::-webkit-scrollbar-thumb:hover { background: rgba(212, 165, 116, 0.35); }

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 48px;
}
@media (max-width: 720px) { .container { padding: 0 22px; } }

.eyebrow {
  font-family: var(--body);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold);
  display: inline-flex;
  align-items: center;
  gap: 14px;
}
.eyebrow::before {
  content: "";
  width: 28px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold));
}

h1, h2, h3, h4 {
  font-family: var(--display);
  font-weight: 300;
  letter-spacing: -0.005em;
  margin: 0;
  color: var(--text);
}
h1 { font-size: clamp(38px, 5.2vw, 80px); line-height: 1.02; }
h2 { font-size: clamp(34px, 4.4vw, 64px); line-height: 1.06; }
h3 { font-size: clamp(22px, 2vw, 30px); line-height: 1.2; }

p { margin: 0; color: var(--text); }
.lede { color: var(--muted); font-size: clamp(15px, 1.1vw, 18px); line-height: 1.7; max-width: 56ch; }

section {
  position: relative;
  padding: clamp(96px, 12vw, 180px) 0;
}
section + section { border-top: 1px solid var(--line-soft); }

.section-head {
  display: grid;
  gap: 24px;
  margin-bottom: clamp(56px, 7vw, 96px);
  max-width: 880px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 18px 32px;
  border: 1px solid var(--gold);
  background: transparent;
  color: var(--gold);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: color .4s ease, border-color .4s ease;
}
.btn::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transform: translateY(101%);
  transition: transform .5s cubic-bezier(.6,.05,.2,1);
  z-index: 0;
}
.btn:hover { color: var(--black); border-color: var(--gold-light); }
.btn:hover::before { transform: translateY(0); }
.btn > * { position: relative; z-index: 1; }
.btn .arrow {
  width: 14px; height: 1px; background: currentColor; position: relative;
  transition: width .4s ease;
}
.btn .arrow::after {
  content: ""; position: absolute; right: -1px; top: -3px;
  width: 7px; height: 7px;
  border-right: 1px solid currentColor;
  border-top: 1px solid currentColor;
  transform: rotate(45deg);
}
.btn:hover .arrow { width: 22px; }

.btn--solid {
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  color: var(--black);
  border-color: transparent;
}
.btn--solid::before { background: var(--black); }
.btn--solid:hover { color: var(--gold-light); border-color: var(--gold); }

.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  padding: 18px 0;
  background: linear-gradient(180deg, rgba(7,7,7,0.85), rgba(7,7,7,0));
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  transition: background .3s ease, border-color .3s ease;
  border-bottom: 1px solid transparent;
}
.nav.scrolled {
  background: rgba(7,7,7,0.82);
  border-bottom-color: var(--line-soft);
}
.nav__inner {
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; text-decoration: none; }
.brand-logo { height: 38px; width: auto; display: block; opacity: .92; }
.nav__links {
  display: flex; gap: 36px;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}
.nav__links a {
  color: inherit; text-decoration: none;
  transition: color .25s ease;
}
.nav__links a:hover { color: var(--gold); }
@media (max-width: 880px) { .nav__links { display: none; } }
.nav__cta {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
  color: var(--gold);
  text-decoration: none;
}
.nav__cta .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 12px var(--gold);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .55; transform: scale(.82); }
}

.ambient {
  position: absolute;
  pointer-events: none;
  width: 1100px; height: 1100px;
  border-radius: 50%;
  background: radial-gradient(circle at center, rgba(212,165,116,0.13), transparent 60%);
  filter: blur(40px);
}

.numeral {
  font-family: var(--display);
  font-weight: 300;
  color: var(--gold);
  font-size: 14px;
  letter-spacing: 0.3em;
}
.numeral em {
  font-style: normal;
  color: var(--muted);
}

.reveal {
  opacity: 1;
  transform: none;
  transition: opacity 1s ease, transform 1s cubic-bezier(.2,.7,.2,1);
}

/* На десктопе — плавное появление заголовков и элементов при скролле */
@media (min-width: 981px) {
  .reveal {
    opacity: 0;
    transform: translateY(28px);
  }
  .reveal.in {
    opacity: 1;
    transform: none;
  }
}

/* На мобильном — всё видно сразу, статичное */
@media (max-width: 980px) {
  .reveal {
    opacity: 1;
    transform: none;
  }
}

.footer {
  padding: 60px 0 50px;
  border-top: 1px solid var(--line-soft);
}
.footer__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.footer__tg {
  display: inline-flex; align-items: center; gap: 14px;
  padding: 14px 26px;
  border: 1px solid var(--line); border-radius: 999px;
  font-size: 13px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--text);
  text-decoration: none;
  transition: border-color .4s, color .4s, background .4s;
}
.footer__tg:hover { border-color: var(--gold); color: var(--gold); background: rgba(212,165,116,.04); }
.footer__copy { font-size: 12px; color: var(--muted); letter-spacing: .1em; }

@media (max-width: 720px) {
  section { padding: 80px 0; }
}
</style>

<script src="vendor/react.js" defer></script>
<script src="vendor/react-dom.js" defer></script>
</head>
<body>

<nav class="nav" id="nav">
  <div class="container nav__inner">
    <a class="brand" href="/">
      <img src="assets/logo.png" alt="Code Timur" class="brand-logo" />
    </a>
    <div class="nav__links">
      <a href="#diagnosis">Диагностика</a>
      <a href="#avatar">Формула</a>
      <a href="#program">Программа</a>
      <a href="#pricing">Форматы</a>
    </div>
    <a class="nav__cta" href="#session"><span class="dot"></span>Запись открыта</a>
  </div>
</nav>

<main id="top">
  <div id="hero-root"></div>
  <div id="diagnosis-root"></div>
  <div id="avatar-root"></div>
  <div id="vectors-root"></div>
  <div id="shadow-root"></div>
  <div id="roles-root"></div>
  <div id="program-root"></div>
  <div id="pricing-root"></div>
  <div id="session-root"></div>
</main>

<footer class="footer">
  <div class="container footer__inner">
    <a class="brand" href="/">
      <img src="assets/logo.png" alt="Code Timur" class="brand-logo" />
    </a>
    <a class="footer__tg" href="https://t.me/codetimur" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M21.5 4.2 2.9 11.4c-1.3.5-1.3 1.2-.3 1.5l4.7 1.5 1.8 5.5c.2.6.4.8.8.8.4 0 .6-.2.8-.5l2.5-2.4 5.2 3.8c1 .5 1.6.3 1.9-.9l3.4-16c.4-1.5-.5-2.2-1.2-1.5z"/>
      </svg>
      <span>Telegram</span>
    </a>
    <span class="footer__copy">© 2026 · CodeTimur</span>
  </div>
</footer>

<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 12);
  }, { passive: true });

  const revealVisible = () => {
    document.querySelectorAll('.reveal:not(.in)').forEach(el => {
      if (el.getBoundingClientRect().top < window.innerHeight * 0.93) {
        el.classList.add('in');
      }
    });
  };

  window.__attachReveal = (root) => {
    const isDesktop = window.matchMedia('(min-width: 981px)').matches;
    if (!isDesktop) {
      (root || document).querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
      return;
    }
    revealVisible();
  };

  // Scroll-based reveal — fires on every scroll event, no debounce so nothing is missed
  window.addEventListener('scroll', revealVisible, { passive: true });
  // Also check after bundle finishes mounting components
  setTimeout(revealVisible, 400);
  setTimeout(revealVisible, 1200);

  document.addEventListener('click', (e) => {
    const a = e.target.closest('a[href^="#"]');
    if (!a) return;
    const id = a.getAttribute('href').slice(1);
    const el = document.getElementById(id);
    if (el) {
      e.preventDefault();
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
</script>

<script src="bundle.js" defer></script>
</body>
</html>
